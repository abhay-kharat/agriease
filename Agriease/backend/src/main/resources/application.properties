# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/agriease

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.qyqcjqfapdyhkjmrlgbs.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Agriease@1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.validation-timeout=5000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FLYWAY
# ===============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1


# ===============================
# LOGGING (optional but useful)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.agriease.backend.config.JwtFilter=DEBUG
logging.level.org.springframework.security=DEBUG

